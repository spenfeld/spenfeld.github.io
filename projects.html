<!DOCTYPE html>
<html>
<head>
  <title>Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg:#0b0b0b;
      --text:#e5e5e5;
      --muted:#a3a3a3;

      --accent:#9ca3af;
      --accent2:#6b7280;

      --border:1px solid rgba(255,255,255,0.08);
      --glow:none;

      --font:ui-monospace;
    }

    html, body {
      margin: 0;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
    }

    /* ✅ GLOBAL TEXT GLOW */
    a, button, h1, h2, h3, p, div, span {
      text-shadow: var(--glow);
    }

    /* 🔥 FIX: CARD GLOW INHERITANCE (THIS WAS MISSING) */
    .card, .card * {
      text-shadow: var(--glow);
    }

    .nav-link {
      transition: opacity 0.12s ease, transform 0.12s ease;
      cursor: pointer;
    }

    .nav-link:hover {
      opacity: 0.6;
      transform: translateX(1px);
    }

    .cursor {
      display: inline-block;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .theme-option {
      display: inline-block;
      cursor: pointer;
    }

    .theme-active {
      text-shadow: 0 0 8px currentColor;
      animation: flicker 2.5s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 0.85; }
      94% { opacity: 1; }
      96% { opacity: 0.9; }
    }

    * {
      transition-duration: 120ms;
    }
  </style>
</head>

<body>

<!-- SCANLINES -->
<div class="pointer-events-none fixed inset-0 z-50"
  style="opacity:0.2;
  background: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.35) 3px
  );"></div>

<div class="pointer-events-none fixed inset-0 z-40"
    style="background: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.55) 100%);">
</div>
<!-- NAVBAR -->
<nav class="px-6 py-5 font-mono tracking-wide"
  style="border-bottom:var(--border)">

  <div class="max-w-5xl mx-auto flex items-center justify-between">

    <a href="./" class="nav-link font-semibold" style="color:var(--accent)">
      [ HOST: Spencer_Feldmann<span class="cursor">_</span> ]
    </a>

    <div class="flex items-center gap-5 text-sm" style="color:var(--muted)">
      <a class="nav-link" href="projects.html" style="color:var(--accent)">[ ARCHIVE ]</a>
      <a class="nav-link" href="about.html">[ PROFILE ]</a>
      <a class="nav-link" href="games.html">[ ARCADE ]</a>
    </div>

  </div>
</nav>

<!-- CONTENT -->
<section class="max-w-3xl mx-auto px-6 py-20">

  <h1 class="text-3xl font-semibold mb-6">ARCHIVE</h1>

  <p class="mb-8" style="color:var(--muted)">
    Selected software work, systems projects, and technical experiments.
  </p>

  <!-- 🔥 CARD (NOW MATCHES INDEX VISUALLY) -->
  <div class="card p-5 rounded-xl"
    style="border:var(--border); box-shadow:var(--glow);">

    <p class="font-semibold">More Coming Soon</p>

    <p class="text-sm mt-2" style="color:var(--muted)">
      This section will contain full project breakdowns and case studies.
    </p>

  </div>

</section>

<!-- THEME HUD -->
<div id="themeBar"
  class="fixed bottom-4 right-4 font-mono text-sm select-none">

  <span class="theme-option theme-active" data-theme="mono">[●] MONO</span>
  <span class="theme-option ml-4" data-theme="amber">[ ] AMBER</span>
  <span class="theme-option ml-4" data-theme="matrix">[ ] MATRIX</span>
  <span class="theme-option ml-4" data-theme="light">[ ] LIGHT</span>

</div>

<script>
const themes = {
  mono:{
    "--bg":"#0b0b0b",
    "--text":"#e5e5e5",
    "--muted":"#a3a3a3",
    "--accent":"#9ca3af",
    "--accent2":"#6b7280",
    "--border":"1px solid rgba(255,255,255,0.08)",
    "--glow":"none",
    "--font":"ui-monospace"
  },

  amber:{
    "--bg":"#0a0705",
    "--text":"#fbbf24",
    "--muted":"#f59e0b",
    "--accent":"#fbbf24",
    "--accent2":"#fde68a",
    "--border":"1px solid rgba(251,191,36,0.22)",
    "--glow":"0 0 10px rgba(251,191,36,0.35)",
    "--font":"ui-monospace"
  },

  matrix:{
    "--bg":"#020403",
    "--text":"#00ff66",
    "--muted":"#00cc55",
    "--accent":"#22ff88",
    "--accent2":"#99ffbb",
    "--border":"1px solid rgba(0,255,102,0.22)",
    "--glow":"0 0 12px rgba(0,255,102,0.4)",
    "--font":"ui-monospace"
  },

  light:{
    "--bg":"#f8fafc",
    "--text":"#0f172a",
    "--muted":"#475569",
    "--accent":"#0284c7",
    "--accent2":"#0369a1",
    "--border":"1px solid rgba(15,23,42,0.12)",
    "--glow":"none",
    "--font":"ui-monospace"
  }
};

function setUI(active){
  document.querySelectorAll(".theme-option").forEach(el=>{
    el.textContent = `[ ] ${el.dataset.theme.toUpperCase()}`;
    el.classList.remove("theme-active");
  });

  const el = document.querySelector(`[data-theme="${active}"]`);
  if(el){
    el.textContent = `[●] ${active.toUpperCase()}`;
    el.classList.add("theme-active");
  }
}

function applyTheme(name){
  const t = themes[name];
  for(const k in t){
    document.documentElement.style.setProperty(k, t[k]);
  }
  localStorage.setItem("theme", name);
  setUI(name);
}

window.addEventListener("DOMContentLoaded", ()=>{
  const saved = localStorage.getItem("theme") || "mono";
  applyTheme(saved);

  document.querySelectorAll(".theme-option").forEach(el=>{
    el.addEventListener("click", ()=>applyTheme(el.dataset.theme));
  });
});
</script>

</body>
</html>
