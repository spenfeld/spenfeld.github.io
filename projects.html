<!DOCTYPE html>
<html>
<head>
  <title>Archive</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- GLOBAL STYLES -->

  <!-- THEME SYSTEM -->
  <script src="scripts/theme.js" defer></script>
</head>

<body>

<!-- SCANLINES -->
<div class="scanlines"></div>

<!-- CRT -->
<div class="crt"></div>

<!-- NAVBAR -->
<nav class="px-6 py-5 font-mono tracking-wide"
  style="border-bottom:var(--border)">

  <div class="max-w-5xl mx-auto flex items-center justify-between">

    <a href="./"
      class="nav-link font-semibold"
      style="color:var(--accent)">

      [ HOST: Spencer_Feldmann<span class="cursor">_</span> ]
    </a>

    <div
      class="flex items-center gap-5 text-sm"
      style="color:var(--muted)">

      <a
        class="nav-link active-nav"
        href="projects.html">

        [ ARCHIVE ]
      </a>

      <a
        class="nav-link"
        href="about.html">

        [ PROFILE ]
      </a>

      <a
        class="nav-link"
        href="games.html">

        [ ARCADE ]
      </a>

    </div>

  </div>
</nav>

<!-- CONTENT -->
<section class="max-w-3xl mx-auto px-6 py-20">

  <h1 class="text-3xl font-semibold mb-6">
    ARCHIVE
  </h1>

  <p class="mb-8" style="color:var(--muted)">
    Selected software work, systems projects,
    and technical experiments.
  </p>

  <!-- CARD -->
  <div class="card p-5 rounded-xl">

    <p class="font-semibold">
      More Coming Soon
    </p>

    <p class="text-sm mt-2"
      style="color:var(--muted)">

      This section will contain full project
      breakdowns and case studies.
    </p>

  </div>

</section>


<!-- HUD -->
<div id="themeBar"
  class="fixed bottom-4 left-0 right-0 px-6 font-mono text-sm select-none">

  <div class="max-w-5xl mx-auto flex items-center justify-between">

    <!-- STATUS -->
    <span style="color:var(--muted)">
      > SYSTEM STATUS: ONLINE
    </span>

    <!-- THEME PICKER -->
    <div>

      <span class="theme-option theme-active"
        data-theme="mono">
        [●] MONO
      </span>

      <span class="theme-option ml-4"
        data-theme="amber">
        [ ] AMBER
      </span>

      <span class="theme-option ml-4"
        data-theme="matrix">
        [ ] MATRIX
      </span>

      <span class="theme-option ml-4"
        data-theme="light">
        [ ] LIGHT
      </span>

    </div>

  </div>

</div>

</body>
</html>
