      This section is reserved for full project breakdowns and case studies.

<!-- THEME SYSTEM (ALIGNED WITH INDEX) -->
<script>
const themes = {
  mono:{
    "--bg":"#0b0b0b",
    "--text":"#e5e5e5",
    "--muted":"#a3a3a3",
    "--accent":"#9ca3af",
    "--accent2":"#6b7280",
    "--border":"1px solid rgba(255,255,255,0.08)",
    "--font":"ui-sans-serif"
  },

  light:{
    "--bg":"#f8fafc",
    "--text":"#0f172a",
    "--muted":"#475569",
    "--accent":"#0284c7",
    "--accent2":"#0369a1",
    "--border":"1px solid rgba(15,23,42,0.12)",
    "--font":"ui-sans-serif"
  },

  amber:{
    "--bg":"#0a0705",
    "--text":"#fbbf24",
    "--muted":"#f59e0b",
    "--accent":"#fbbf24",
    "--accent2":"#fde68a",
    "--border":"1px solid rgba(251,191,36,0.22)",
    "--font":"ui-monospace"
  },

  matrix:{
    "--bg":"#020403",
    "--text":"#00ff66",
    "--muted":"#00cc55",
    "--accent":"#22ff88",
    "--accent2":"#99ffbb",
    "--border":"1px solid rgba(0,255,102,0.22)",
    "--font":"ui-monospace"
  }
};

function applyTheme(name){
  const t = themes[name];
  for(const k in t){
    document.documentElement.style.setProperty(k, t[k]);
  }
  localStorage.setItem("theme", name);
}

window.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("theme") || "mono";
  applyTheme(saved);

  const select = document.getElementById("themeSelect");
  select.value = saved;

  select.addEventListener("change", e => applyTheme(e.target.value));
});
</script>

</body>
</html>
